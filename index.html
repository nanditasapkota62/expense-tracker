<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spendly</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="auth-card">
    <h2>💸 Spendly</h2>
    <p>Track every penny, own your finances.</p>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div class="tab-content" id="form-login">
      <div class="field"><label>Email</label><input id="l-email" type="email" placeholder="you@email.com"/></div>
      <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn" onclick="doLogin()">Sign In</button>
      <div class="err" id="l-err"></div>
      <div class="hint">Demo: demo@spendly.app / demo1234</div>
    </div>
    <div class="tab-content" id="form-register" style="display:none">
      <div class="field"><label>Full Name</label><input id="r-name" type="text" placeholder="Jane Doe"/></div>
      <div class="field"><label>Email</label><input id="r-email" type="email" placeholder="you@email.com"/></div>
      <div class="field"><label>Password</label><input id="r-pass" type="password" placeholder="min 6 chars"/></div>
      <button class="btn" onclick="doRegister()">Create Account</button>
      <div class="err" id="r-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">💸 Spendly</div>
    <button class="nav-btn active" id="nav-dashboard"  onclick="goTo('dashboard')">📊 Dashboard</button>
    <button class="nav-btn"        id="nav-expenses"   onclick="goTo('expenses')">📋 All Expenses</button>
    <button class="nav-btn"        id="nav-add"        onclick="goTo('add')">➕ Add Expense</button>
    <button class="nav-btn"        id="nav-categories" onclick="goTo('categories')">🏷️ Categories</button>
    <button class="nav-btn"        id="nav-budget"     onclick="goTo('budget')">💰 Budget</button>
    <div class="sidebar-bottom">
      <div class="user-info">👤 <span id="username"></span></div>
      <button class="logout" onclick="doLogout()">← Sign Out</button>
    </div>
  </div>

  <div class="main">

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <div class="page-top">
        <h1>Dashboard</h1>
        <button class="add-btn" onclick="goTo('add')">+ Add Expense</button>
      </div>
      <div id="budget-alert" style="display:none"></div>
      <div class="stats">
        <div class="card green"><label>This Month</label><h3 id="stat-month">$0.00</h3></div>
        <div class="card"><label>This Year</label><h3 id="stat-year">$0.00</h3></div>
        <div class="card"><label>All Time</label><h3 id="stat-all">$0.00</h3></div>
      </div>
      <div class="card">
        <strong style="font-size:14px">Spending by Category</strong>
        <div style="display:flex;gap:20px;margin-top:14px;align-items:flex-start;flex-wrap:wrap">
          <canvas id="chart" width="200" height="200"></canvas>
          <div class="legend" id="legend"></div>
        </div>
      </div>
      <div class="card">
        <strong style="font-size:14px">Recent Transactions</strong>
        <div id="recent" style="margin-top:10px"></div>
      </div>
    </div>

    <!-- All Expenses -->
    <div class="page" id="page-expenses">
      <div class="page-top">
        <h1>All Expenses</h1>
        <div style="display:flex;gap:8px">
          <button class="export-btn" onclick="exportCSV()">⬇️ Export CSV</button>
          <button class="danger-btn" onclick="clearAllData()">🗑️ Clear All</button>
        </div>
      </div>
      <div class="filters">
        <input id="search" placeholder="🔍 Search..." oninput="renderExpenses()"/>
        <select id="cat-filter" onchange="renderExpenses()">
          <option value="">All Categories</option>
          <option>Food & Dining</option><option>Housing</option><option>Transport</option>
          <option>Shopping</option><option>Entertainment</option><option>Health</option>
          <option>Education</option><option>Other</option>
        </select>
        <select id="sort-filter" onchange="renderExpenses()">
          <option value="date-desc">Newest</option>
          <option value="date-asc">Oldest</option>
          <option value="amt-desc">Highest</option>
          <option value="amt-asc">Lowest</option>
        </select>
      </div>
      <div class="card" style="padding:0;overflow:hidden"><div id="exp-list"></div></div>
    </div>

    <!-- Add Expense -->
    <div class="page" id="page-add">
      <div class="page-top"><h1>Add Expense</h1></div>
      <div class="form-card">
        <div class="field"><label>Description *</label><input id="add-desc" placeholder="e.g. Grocery run"/></div>
        <div class="form-row">
          <div class="field"><label>Amount ($) *</label><input id="add-amt" type="number" placeholder="0.00" step="0.01"/></div>
          <div class="field"><label>Date *</label><input id="add-date" type="date"/></div>
        </div>
        <div class="field"><label>Category</label>
          <select id="add-cat">
            <option>Food & Dining</option><option>Housing</option><option>Transport</option>
            <option>Shopping</option><option>Entertainment</option><option>Health</option>
            <option>Education</option><option>Other</option>
          </select>
        </div>
        <div class="field"><label>Note (optional)</label><input id="add-note" placeholder="Any details..."/></div>
        <button class="btn" onclick="addExpense()">Save Expense</button>
        <div id="add-msg" class="success"></div>
      </div>
    </div>

    <!-- Categories -->
    <div class="page" id="page-categories">
      <div class="page-top"><h1>Categories</h1></div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- Budget -->
    <div class="page" id="page-budget">
      <div class="page-top"><h1>💰 Budget Tracking</h1></div>

      <!-- Overall budget -->
      <div class="card">
        <div id="overall-budget-display"></div>
        <div style="display:flex;gap:10px;margin-top:14px">
          <input id="overall-input" type="number" placeholder="Set overall monthly budget ($)" min="0" step="1"
            style="flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;font-family:inherit"/>
          <button class="add-btn" onclick="saveOverallBudget()">Save</button>
        </div>
      </div>

      <!-- Per category -->
      <strong style="font-size:15px;display:block;margin-bottom:14px">Budget per Category (This Month)</strong>
      <div class="budget-grid" id="budget-grid"></div>
    </div>

  </div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Edit Expense</h3>
    <input type="hidden" id="edit-id"/>
    <div class="field"><label>Description</label><input id="edit-desc"/></div>
    <div class="form-row">
      <div class="field"><label>Amount</label><input id="edit-amt" type="number" step="0.01"/></div>
      <div class="field"><label>Date</label><input id="edit-date" type="date"/></div>
    </div>
    <div class="field"><label>Category</label>
      <select id="edit-cat">
        <option>Food & Dining</option><option>Housing</option><option>Transport</option>
        <option>Shopping</option><option>Entertainment</option><option>Health</option>
        <option>Education</option><option>Other</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="save" onclick="saveEdit()">Save</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
